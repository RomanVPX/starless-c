name: Release Builds and Packaging

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_package:
    strategy:
      fail-fast: false
      matrix:
        runner_os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - runner_os: ubuntu-latest
            os_display_name: Linux
            artifact_suffix: linux-amd64
            binary_name: blackhole_tracer
            archive_extension: tar.gz
          - runner_os: macos-latest
            os_display_name: macOS
            artifact_suffix: macos-arm64
            binary_name: blackhole_tracer
            archive_extension: tar.gz
          - runner_os: windows-latest
            os_display_name: Windows
            artifact_suffix: windows-amd64
            binary_name: blackhole_tracer.exe
            archive_extension: zip
    runs-on: ${{ matrix.runner_os }}
    name: Build on ${{ matrix.os_display_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies (Linux)
        if: matrix.runner_os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y build-essential make

      - name: Install dependencies (macOS)
        if: matrix.runner_os == 'macos-latest'
        run: brew install make

      - name: Install dependencies (Windows)
        if: matrix.runner_os == 'windows-latest'
        run: choco install make

      - name: Define archive names
        shell: bash
        id: archive_names
        run: |
          echo "basename=starless-c-${{ matrix.artifact_suffix }}" >> $GITHUB_OUTPUT
          echo "full_name=starless-c-${{ matrix.artifact_suffix }}-${{ github.ref_name }}.${{ matrix.archive_extension }}" >> $GITHUB_OUTPUT

      - name: Build and stage
        shell: bash
        run: |
          make install RELEASE=1 DESTDIR="staging_area/${{ steps.archive_names.outputs.basename }}"

      - name: Create archive
        shell: bash
        run: |
          cd staging_area/${{ steps.archive_names.outputs.basename }}
          if [ "${{ matrix.archive_extension }}" == "tar.gz" ]; then
            tar -czvf ../../${{ steps.archive_names.outputs.full_name }} .
          elif [ "${{ matrix.archive_extension }}" == "zip" ]; then
            pwsh -Command "Compress-Archive -Path '*' -DestinationPath '../../${{ steps.archive_names.outputs.full_name }}' -Force"
          fi
          cd ../..

      - name: Upload build artifact (archive)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive_names.outputs.basename }}
          path: ${{ steps.archive_names.outputs.full_name }}

  create_release:
    needs: build_and_package
    runs-on: ubuntu-latest
    name: Create release
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: List downloaded files (for debugging paths)
        run: ls -R downloaded-artifacts

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: .github/changelog-configuration.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          body: ${{ steps.changelog.outputs.changelog }}
          # prerelease: false
          files: |
            downloaded-artifacts/starless-c-linux-amd64/*.tar.gz
            downloaded-artifacts/starless-c-macos-arm64/*.tar.gz
            downloaded-artifacts/starless-c-windows-amd64/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
